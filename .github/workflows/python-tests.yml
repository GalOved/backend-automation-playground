name: Python API Tests

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start webhook-receiver
        working-directory: services/webhook-receiver
        run: dotnet run &
        env:
          ASPNETCORE_URLS: http://localhost:5000

      - name: Start scan-api
        working-directory: services/scan-api
        run: dotnet run &
        env:
          ASPNETCORE_URLS: http://localhost:5094

      - name: Wait for services to be ready
        run: |
          echo "Waiting for scan-api..."
          for i in {1..15}; do
            curl -sf http://localhost:5094/health && break
            sleep 2
          done
          echo "Waiting for webhook-receiver..."
          for i in {1..15}; do
            curl -sf http://localhost:5000/webhooks && break
            sleep 2
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: tests/python-api-tests
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: tests/python-api-tests
        run: python -m pytest -v --tb=short
